<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Sabbatical</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100vh;
    height: 100dvh;
  }
  body {
    font-family: 'DM Mono', 'Courier New', monospace;
    background: #F5F2EC;
    color: #2A2622;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
    cursor: crosshair;
    -webkit-font-smoothing: antialiased;
  }

  /* ── SCROLL WRAPPER (mobile side-scroll) ── */
  .scroll-wrap {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-x: contain;
    scrollbar-color: #C8C0B4 transparent;
  }
  .scroll-wrap::-webkit-scrollbar {
    height: 6px;
  }
  .scroll-wrap::-webkit-scrollbar-track {
    background: #EBE8E2;
  }
  .scroll-wrap::-webkit-scrollbar-thumb {
    background: #C8C0B4;
    border-radius: 3px;
  }
  .scroll-wrap::-webkit-scrollbar-thumb:hover {
    background: #A09888;
  }
  .scroll-inner {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-width: 1000px;
    width: max-content;
    height: 100%;
  }

  /* ── HEADER ── */
  .header {
    padding: 18px 24px 12px;
    border-bottom: 1px solid #D8D2C8;
    flex-shrink: 0;
  }
  .header-sup {
    font-size: 7.5px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #A09888;
    margin-bottom: 2px;
  }
  .header h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 8.5px;
    color: #8A8078;
    margin-top: 2px;
  }
  .pulse {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #8A8078;
    margin-right: 4px;
    vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 1; }
  }

  /* ── MONTHS ── */
  .months {
    display: flex;
    border-bottom: 1px solid #D8D2C8;
    height: 20px;
    flex-shrink: 0;
  }
  .month-label {
    display: flex;
    align-items: center;
    padding-left: 0;
    text-indent: 6px;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6A6258;
  }
  .month-label + .month-label { border-left: 1px solid #C8C0B4; }
  .month-label:nth-child(odd) { background: rgba(0,0,0,0.012); }

  /* ── STRIPS CONTAINER ── */
  .strips {
    flex: 1;
    display: flex;
    align-items: stretch;
    min-height: 0;
  }

  /* ── STRIP ── */
  .strip {
    flex: 1;
    min-width: 10px;
    position: relative;
    transition: background 0.1s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
  }
  .strip::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    right: 0;
    width: 1px;
    background: rgba(0,0,0,0.03);
  }
  .strip.month-start { border-left: 1px solid #C8C0B4; }

  /* Empty strips */
  .strip:hover { background: rgba(0,0,0,0.025); }

  /* Data strips */
  .strip.has-data {
    /* background set inline from image color */
  }
  .strip.has-data:hover {
    filter: brightness(1.1);
  }

  /* ── WORD COUNT BAR ── */
  .bar {
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    border-radius: 1px 1px 0 0;
    /* background set inline as lighter tint of strip color */
    transition: opacity 0.2s ease;
  }
  .bars-hidden .bar {
    opacity: 0;
  }

  /* ── TOGGLE ── */
  .toggle-btn {
    margin-left: auto;
    background: none;
    border: 1px solid #D8D2C8;
    padding: 2px 8px;
    font-family: inherit;
    font-size: 7px;
    letter-spacing: 0.15em;
    color: #9A9184;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .toggle-btn:hover {
    border-color: #B0A898;
    color: #6A6258;
  }
  .toggle-btn.active {
    background: #E8E4DC;
    border-color: #B0A898;
    color: #5A5044;
  }
  .color-toggles {
    display: flex;
    gap: 4px;
    margin-right: auto;
  }

  /* ── RULER ── */
  .ruler {
    display: flex;
    align-items: flex-start;
    flex-shrink: 0;
    border-top: 1px solid #D8D2C8;
  }
  .ruler-mark {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .tick {
    width: 1px;
    flex-shrink: 0;
  }
  .day-num {
    height: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6.5px;
    color: #8A8078;
    letter-spacing: 0.02em;
  }

  /* ── LEGEND ── */
  .legend {
    padding: 5px 24px;
    border-top: 1px solid #D8D2C8;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 7.5px;
    letter-spacing: 0.08em;
    color: #9A9184;
    flex-shrink: 0;
  }
  .swatch {
    width: 8px; height: 8px;
    display: inline-block;
    margin-right: 3px;
    vertical-align: middle;
  }

  /* ── HOVER CARD ── */
  .hover-card {
    position: fixed;
    width: 310px;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .hover-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .card-inner {
    background: #FDFCFA;
    border: 1px solid #C5BDB0;
    box-shadow:
      0 8px 30px rgba(0,0,0,0.10),
      0 1px 3px rgba(0,0,0,0.04);
    overflow: hidden;
  }

  /* Image area with color placeholder */
  .card-img-wrap {
    width: 100%;
    height: 220px;
    position: relative;
    overflow: hidden;
  }
  .card-img-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-img-placeholder span {
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    position: relative;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .card-img.loaded { opacity: 1; }

  .card-meta {
    padding: 10px 14px 12px;
  }
  .card-meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 5px;
  }
  .card-day {
    font-size: 7.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #8A7A66;
    font-weight: 500;
  }
  .card-date {
    font-size: 7.5px;
    color: #B0A898;
    letter-spacing: 0.05em;
  }
  .card-text {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 12px;
    line-height: 1.6;
    font-weight: 400;
    color: #3A3632;
  }

  /* Empty day hover */
  .card-empty {
    padding: 18px 14px;
    text-align: center;
  }
  .card-empty .card-day { margin-bottom: 2px; }
  .card-empty .card-date { margin-bottom: 8px; display: block; }
  .card-empty-msg {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 11px;
    color: #C5BDB3;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-sup">Tableau Graphique</div>
  <h1>A Sabbatical</h1>
  <div class="header-sub"><span class="pulse"></span>In progress · 15 Sept 2025 – <em>present</em></div>
</div>

<div class="scroll-wrap">
<div class="scroll-inner">
<div class="months" id="months"></div>
<div class="strips bars-hidden" id="strips"></div>
<div class="ruler" id="ruler"></div>
</div>
</div>

    <button class="toggle-btn" data-mode="brightness">BRIGHTNESS</button>

  </span>
  <button class="toggle-btn" id="toggleBars">WORD COUNT(Scale:1:5)</button>
</div>

<div class="hover-card" id="hoverCard">
  <div class="card-inner" id="cardInner"></div>
</div>

let currentColorMode = "saturated";


// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function dayToDate(d) {
  const dt = new Date(DAY_ONE);
  dt.setDate(dt.getDate() + (d - 1));
  return dt;
}
function fmtDate(d) {
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}
function wordCount(s) { return s.split(/\s+/).length; }

const maxWC = Math.max(...Object.values(P).map(p => wordCount(p.t)));

// ── Image cache (lazy on hover + neighbor preload) ──
const imgCache = {};
function loadImg(day) {
  if (imgCache[day]) return imgCache[day];
  const p = P[day];
  if (!p) return null;
  imgCache[day] = new Promise(res => {
    const im = new Image();
    im.onload = () => res(im.src);
    im.onerror = () => res(null);
    im.src = p.img;
  });
  return imgCache[day];
}
function preloadNear(day) {
  for (let d = day - 2; d <= day + 2; d++) {
    if (P[d] && !imgCache[d]) loadImg(d);
  }
}

// ═══════════════════════════════════════════
// BUILD MONTH HEADERS
// ═══════════════════════════════════════════
const monthsEl = document.getElementById('months');
const mSpans = [];
let lm = -1;
for (let i = 1; i <= TOTAL; i++) {
  const m = dayToDate(i).getMonth();
  if (m !== lm) {
    mSpans.push({ label: dayToDate(i).toLocaleDateString('en-IN', { month:'long' }), n: 1 });
    lm = m;
  } else mSpans[mSpans.length-1].n++;
}
mSpans.forEach(ms => {
  const el = document.createElement('div');
  el.className = 'month-label';
  el.style.flex = ms.n;
  el.textContent = ms.label;
  monthsEl.appendChild(el);
});

// ═══════════════════════════════════════════
// BUILD STRIPS
// ═══════════════════════════════════════════
const stripsEl = document.getElementById('strips');
let pm = -1;

for (let i = 1; i <= TOTAL; i++) {
  const dt = dayToDate(i);
  const m = dt.getMonth();
  const isMS = m !== pm && i > 1;
  pm = m;

  const post = P[i];
  const s = document.createElement('div');
  s.className = 'strip' + (post ? ' has-data' : '') + (isMS ? ' month-start' : '');
  s.dataset.day = i;

  // Color strip from image dominant color
  if (post && COLOR_MODES[currentColorMode][i]) {
    s.style.background = COLOR_MODES[currentColorMode][i];
  }

  // Bar
  if (post) {
    const wc = wordCount(post.t);
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = (wc * 5) + 'px';
    // Lighter tint of the strip's dominant color
    // bar color set dynamically via recolor()
    s.appendChild(bar);
  }

  stripsEl.appendChild(s);
}

// ═══════════════════════════════════════════
// BUILD RULER
// ═══════════════════════════════════════════
const rulerEl = document.getElementById('ruler');
for (let i = 1; i <= TOTAL; i++) {
  const post = P[i];
  const mark = document.createElement('div');
  mark.className = 'ruler-mark';

  const tk = document.createElement('div');
  tk.className = 'tick';
  tk.style.height = post ? '6px' : (i % 5 === 0 ? '4px' : '2px');
  tk.style.background = '#D8D2C8';
  mark.appendChild(tk);

  const show = i === 1 || i === TOTAL || i % 10 === 0;
  const dn = document.createElement('div');
  dn.className = 'day-num';
  dn.textContent = show ? i : '';
  mark.appendChild(dn);

  rulerEl.appendChild(mark);
}

// ═══════════════════════════════════════════
// HOVER CARD
// ═══════════════════════════════════════════
const card = document.getElementById('hoverCard');
const inner = document.getElementById('cardInner');
let curDay = null;

function showCard(day, x, y) {
  const post = P[day];
  const dt = dayToDate(day);

  if (post) {
    inner.innerHTML =
      '<div class="card-img-wrap" style="background:' + post.c + '">' +
        '<div class="card-img-placeholder"><span>·</span></div>' +
        '<img class="card-img" id="cImg" alt="" />' +
      '</div>' +
      '<div class="card-meta">' +
        '<div class="card-meta-row">' +
          '<span class="card-day">Day ' + day + '</span>' +
          '<span class="card-date">' + fmtDate(dt) + '</span>' +
        '</div>' +
        '<div class="card-text">' + post.t + '</div>' +
      '</div>';

    const imgEl = document.getElementById('cImg');
    const cached = loadImg(day);
    if (cached) {
      cached.then(src => {
        if (src && curDay === day) {
          imgEl.src = src;
          imgEl.classList.add('loaded');
        }
      });
    }
    preloadNear(day);
  } else {
    inner.innerHTML =
      '<div class="card-empty">' +
        '<div class="card-day">Day ' + day + '</div>' +
        '<span class="card-date">' + fmtDate(dt) + '</span>' +
        '<div class="card-empty-msg">Awaiting data</div>' +
      '</div>';
  }

  posCard(x, y);
  card.classList.add('visible');
}

function posCard(x, y) {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const cw = 310;
  const left = x > vw * 0.6 ? x - cw - 14 : x + 14;
  const top = Math.max(6, Math.min(y - 120, vh - 340));
  card.style.left = left + 'px';
  card.style.top = top + 'px';
}

function hideCard() {
  curDay = null;
  card.classList.remove('visible');
}

// Single event delegation
stripsEl.addEventListener('mousemove', e => {
  const s = e.target.closest('.strip');
  if (!s) { hideCard(); return; }
  const day = +s.dataset.day;
  if (day !== curDay) {
    curDay = day;
    showCard(day, e.clientX, e.clientY);
  } else {
    posCard(e.clientX, e.clientY);
  }
});
stripsEl.addEventListener('mouseleave', hideCard);

// ═══════════════════════════════════════════
// RECOLOR STRIPS
// ═══════════════════════════════════════════
function recolor(mode) {
  currentColorMode = mode;
  const colors = COLOR_MODES[mode];
  const strips = stripsEl.querySelectorAll('.strip.has-data');
  strips.forEach(s => {
    const day = +s.dataset.day;
    const col = colors[day];
    if (col) {
      s.style.background = col;
      // Update bar to lighter tint
      const bar = s.querySelector('.bar');
      if (bar) {
        const r = parseInt(col.slice(1,3),16), g = parseInt(col.slice(3,5),16), b = parseInt(col.slice(5,7),16);
        bar.style.background = `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
      }
    }
  });
}

// Set initial bar colors
recolor('saturated');

// ═══════════════════════════════════════════
// COLOR MODE TOGGLES
// ═══════════════════════════════════════════
document.getElementById('colorToggles').addEventListener('click', e => {
  const btn = e.target.closest('[data-mode]');
  if (!btn) return;
  document.querySelectorAll('#colorToggles .toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  recolor(btn.dataset.mode);
});

// ═══════════════════════════════════════════
// TOGGLE WORD COUNT BARS
// ═══════════════════════════════════════════
const toggleBtn = document.getElementById('toggleBars');
toggleBtn.addEventListener('click', () => {
  stripsEl.classList.toggle('bars-hidden');
  toggleBtn.classList.toggle('active');
});

// ═══════════════════════════════════════════
// TOGGLE BAR WIDTH
// ═══════════════════════════════════════════
const toggleWidth = document.getElementById('toggleWidth');
toggleWidth.addEventListener('click', () => {
  stripsEl.classList.toggle('bars-wide');
  toggleWidth.classList.toggle('active');
});

// ═══════════════════════════════════════════
// TOGGLE BAR SCALE (1× / 10×)
// ═══════════════════════════════════════════
let barScale = 1;
const toggleScale = document.getElementById('toggleScale');
toggleScale.addEventListener('click', () => {
  barScale = barScale === 1 ? 5 : 1;
  toggleScale.classList.toggle('active');
  toggleScale.textContent = barScale === 5 ? '1×' : '5×';
  stripsEl.querySelectorAll('.strip.has-data').forEach(s => {
    const bar = s.querySelector('.bar');
    if (bar) {
      const day = +s.dataset.day;
      const wc = wordCount(P[day].t);
      bar.style.height = (wc * barScale) + 'px';
    }
  });
});
</script>

</body>
</html>
